services:
  admin-frontend:
    image: ${ADMIN_FRONTEND_IMAGE:?Set ADMIN_FRONTEND_IMAGE in .env}
    container_name: digitalshop-admin-frontend
    restart: unless-stopped
    depends_on:
      - admin-backend
    environment:
      NODE_ENV: production
      PORT: 4100
      API_ORIGIN: ${ADMIN_FRONTEND_API_ORIGIN:-http://admin-backend:3000}
    ports:
      - "${ADMIN_FRONTEND_HOST_PORT:-4100}:4100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin-backend:
    image: ${ADMIN_BACKEND_IMAGE:?Set ADMIN_BACKEND_IMAGE in .env}
    container_name: digitalshop-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SHOP_SECRET_ENCRYPTION_KEY: ${SHOP_SECRET_ENCRYPTION_KEY:?Set SHOP_SECRET_ENCRYPTION_KEY in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3d}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4100}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      ENABLE_RATE_LIMITING: ${ENABLE_RATE_LIMITING:-true}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-1000}
      LOG_LEVEL: ${ADMIN_LOG_LEVEL:-info}
      LOG_FORMAT: ${ADMIN_LOG_FORMAT:-json}
      HEALTH_CHECK_TIMEOUT: ${HEALTH_CHECK_TIMEOUT:-5000}
    ports:
      - "127.0.0.1:${ADMIN_BACKEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Bundles the bot runner: BotRunnerManager runs one bot_binance_pay instance
  # per ACTIVE shop, configured from the database (admin Settings).
  backend-bot:
    image: ${BACKEND_BOT_IMAGE:?Set BACKEND_BOT_IMAGE in .env}
    container_name: digitalshop-backend-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:?Set BOT_INTERNAL_SECRET in .env}
      SHOP_SECRET_ENCRYPTION_KEY: ${SHOP_SECRET_ENCRYPTION_KEY:?Set SHOP_SECRET_ENCRYPTION_KEY in .env}
      BOT_RUNNER_ENABLED: ${BOT_RUNNER_ENABLED:-true}
      BOT_RUNNER_POLL_MS: ${BOT_RUNNER_POLL_MS:-15000}
      PENDING_ORDER_SYNC_ENABLED: ${PENDING_ORDER_SYNC_ENABLED:-true}
      PENDING_ORDER_SYNC_POLL_MS: ${PENDING_ORDER_SYNC_POLL_MS:-30000}
      PENDING_ORDER_SYNC_BATCH_SIZE: ${PENDING_ORDER_SYNC_BATCH_SIZE:-100}
      DAILY_LOGIN_POINTS_REWARD: ${DAILY_LOGIN_POINTS_REWARD:-5}
      DAILY_LOGIN_TIMEZONE: ${DAILY_LOGIN_TIMEZONE:-Asia/Ho_Chi_Minh}
      REFERRAL_REFERRER_BONUS: ${REFERRAL_REFERRER_BONUS:-1}
      REFERRAL_REFEREE_BONUS: ${REFERRAL_REFEREE_BONUS:-1}
    ports:
      - "127.0.0.1:${BACKEND_BOT_HOST_PORT:-3001}:3001"
