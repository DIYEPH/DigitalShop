name: Deploy VPS

on:
  push:
    branches:
      - release
    paths:
      - ".github/workflows/deploy-vps.yml"
      - "deploy/vps/**"
      - "admin-frontend/**"
      - "admin-backend/**"
      - "backend-bot/**"
      - "bot_binance_pay/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PLATFORM: linux/arm64

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: names
        shell: bash
        run: |
          echo "namespace=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build admin-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./admin-frontend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/admin-frontend:${{ steps.names.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/admin-frontend:latest
          cache-from: type=gha,scope=admin-frontend
          cache-to: type=gha,mode=max,scope=admin-frontend

      - name: Build admin-backend
        uses: docker/build-push-action@v6
        with:
          context: ./admin-backend
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/admin-backend:${{ steps.names.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/admin-backend:latest
          cache-from: type=gha,scope=admin-backend
          cache-to: type=gha,mode=max,scope=admin-backend

      # The backend-bot image bundles bot_binance_pay; BotRunnerManager runs
      # one bot instance per ACTIVE shop, so no separate bot image is built.
      - name: Build backend-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend-bot/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/backend-bot:${{ steps.names.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.names.outputs.namespace }}/backend-bot:latest
          cache-from: type=gha,scope=backend-bot
          cache-to: type=gha,mode=max,scope=backend-bot

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: names
        shell: bash
        run: |
          echo "namespace=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key deploy/vps/docker-compose.yml "$VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/docker-compose.yml"

      - name: Pull and restart services
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          IMAGE_NAMESPACE: ${{ steps.names.outputs.namespace }}
          IMAGE_TAG: ${{ steps.names.outputs.tag }}
        run: |
          ADMIN_FRONTEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/admin-frontend:${IMAGE_TAG}"
          ADMIN_BACKEND_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/admin-backend:${IMAGE_TAG}"
          BACKEND_BOT_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/backend-bot:${IMAGE_TAG}"

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_DEPLOY_PATH' && \
             if [ -n '$GHCR_READ_TOKEN' ]; then echo '$GHCR_READ_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin; fi && \
             ADMIN_FRONTEND_IMAGE='$ADMIN_FRONTEND_IMAGE' \
             ADMIN_BACKEND_IMAGE='$ADMIN_BACKEND_IMAGE' \
             BACKEND_BOT_IMAGE='$BACKEND_BOT_IMAGE' \
             docker compose pull && \
             ADMIN_FRONTEND_IMAGE='$ADMIN_FRONTEND_IMAGE' \
             ADMIN_BACKEND_IMAGE='$ADMIN_BACKEND_IMAGE' \
             BACKEND_BOT_IMAGE='$BACKEND_BOT_IMAGE' \
             docker compose up -d --remove-orphans && \
             docker image prune -f"
